# Banking Wallet — Local Development Infrastructure
# Usage: docker compose -f infra/docker-compose.yml up -d
# Or use: ./scripts/dev-up.sh

name: banking-wallet

services:
  # ──────────────────────────────────────────────
  # DATA STORES
  # ──────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: bw-postgres
    environment:
      POSTGRES_USER: wallet_admin
      POSTGRES_PASSWORD: wallet_secret
      POSTGRES_DB: wallet_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/seed-postgres.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet_admin -d wallet_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: bw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: redis-server --appendonly yes
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # MESSAGING
  # ──────────────────────────────────────────────

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: bw-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --mode dev-container
    ports:
      - "19092:19092"   # Kafka API (external)
      - "18081:18081"   # Schema Registry (external)
      - "9644:9644"     # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--api-urls", "localhost:9644"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # EMAIL
  # ──────────────────────────────────────────────

  mailhog:
    image: mailhog/mailhog:latest
    container_name: bw-mailhog
    platform: linux/amd64
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # OBSERVABILITY
  # ──────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: bw-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: bw-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
      tempo:
        condition: service_started
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: bw-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"     # Tempo HTTP
      - "4317:4317"     # OTLP gRPC (direct, bypassing collector)
      - "4318:4318"     # OTLP HTTP (direct, bypassing collector)
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD", "/tempo", "-version"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: bw-loki
    command: ["-config.file=/etc/loki/loki.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "-version"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: bw-otel-collector
    command: ["--config=/etc/otel-collector/otel-collector.yml"]
    ports:
      - "14317:4317"   # OTLP gRPC (via collector)
      - "14318:4318"   # OTLP HTTP (via collector)
    volumes:
      - ./otel-collector/otel-collector.yml:/etc/otel-collector/otel-collector.yml:ro
    depends_on:
      tempo:
        condition: service_started
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  # ──────────────────────────────────────────────
  # INSPECTION TOOLS
  # ──────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bw-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wallet.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/misc/ping')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  redpanda-console:
    image: redpandadata/console:latest
    container_name: bw-redpanda-console
    environment:
      CONFIG_FILEPATH: ""
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: http://redpanda:9644
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/admin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  postgres_data:
    name: bw-postgres-data
  redis_data:
    name: bw-redis-data
  redpanda_data:
    name: bw-redpanda-data
  prometheus_data:
    name: bw-prometheus-data
  grafana_data:
    name: bw-grafana-data
  tempo_data:
    name: bw-tempo-data
  loki_data:
    name: bw-loki-data
